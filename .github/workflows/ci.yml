name: iOS Build and Test

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Build and Test
        uses: sersoft-gmbh/xcodebuild-action@v3.2.0
        with:
          project: EPCollaboratif.xcodeproj
          scheme: EPCollaboratif
          destination: 'platform=iOS Simulator,name=iPhone 16,OS=latest'
          action: test
          # On enregistre le résultat à la racine
          result-bundle-path: 'TestResults.xcresult'

      - name: Process Test Results
        uses: kishikawakatsumi/xcresulttool@v1
        with:
          # On cherche le fichier au même endroit (à la racine)
          path: 'TestResults.xcresult'
        # S'exécute même si les tests échouent pour générer le rapport
        if: success() || failure()
